<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Drums</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="shortcut icon" href="favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alegreya+Sans:wght@400;500;700;800&family=Bodoni+Moda:opsz,wght@6..96,400;6..96,600;6..96,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="grain"></div>
    <div class="container">
        <div class="game-container">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="trackingOverlay" class="tracking-overlay" aria-hidden="true"></canvas>
            <canvas id="hitCanvas" class="hit-canvas" aria-hidden="true"></canvas>
            <div id="statusBar" class="status-bar">
                <p id="cameraStatus">Press Start once to allow camera and sound.</p>
            </div>
            <button id="bootButton" class="boot-button hidden">Start</button>
            <button id="resetSetupBtn" class="reset-setup-btn hidden" title="Back to setup">⚙</button>

            <!-- Setup modal: asks if user has a real drum kit -->
            <div id="setupModal" class="setup-modal">
                <div class="setup-card">
                    <h2>Welcome to Air Drums</h2>
                    <p>Do you have a real drum kit in front of you?</p>
                    <div class="setup-buttons">
                        <button id="setupNo" class="setup-btn setup-btn--no">
                            <span class="setup-btn__icon">🙅</span>
                            <span class="setup-btn__label">No, just me</span>
                            <span class="setup-btn__desc">Use default pad positions</span>
                        </button>
                        <button id="setupYes" class="setup-btn setup-btn--yes">
                            <span class="setup-btn__icon">🥁</span>
                            <span class="setup-btn__label">Yes, I have drums</span>
                            <span class="setup-btn__desc">Position pads on your kit</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Calibration overlay: drag pads onto real drums -->
            <div id="calibrationOverlay" class="calibration-overlay hidden">
                <div class="calibration-header">
                    <p>Drag each pad to match your drum positions, then press Done</p>
                    <button id="calibrationDone" class="calibration-done-btn">Done</button>
                </div>
            </div>
            <div id="countdownOverlay" class="countdown-overlay hidden" aria-live="polite"></div>

            <!-- Spotify player -->
            <div id="spotifyDock" class="spotify-dock hidden">
                <div id="spotifyPlayer"></div>
                <button id="spotifyClose" class="spotify-close-btn" title="Hide player">&times;</button>
            </div>

            <section class="rail-dock">
                <div class="rail-controls">
                    <select id="songSelect" aria-label="Choose beat"></select>
                </div>
                <div class="rail-viewport" id="railViewport">
                    <div id="railTrack" class="rail-track"></div>
                    <div class="playhead"></div>
                </div>
            </section>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
